name: Deploy PWA and Trigger OTA

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Auto-Version Service Worker (Trigger OTA)
        run: |
          # Obtenemos el hash corto del último commit
          COMMIT_HASH=$(git rev-parse --short HEAD)
          # Reemplazamos cualquier versión antigua (ej. pos-pwa-v1.1) por el nuevo hash en sw.js
          sed -i "s/const CACHE_NAME = '.*';/const CACHE_NAME = 'pos-pwa-${COMMIT_HASH}';/" sw.js
          echo "Service worker actualizado a la versión: pos-pwa-${COMMIT_HASH}"

      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
